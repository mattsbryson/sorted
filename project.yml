name: RemindSort
options:
  bundleIdPrefix: com.mattbryson
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
targets:
  RemindSort:
    type: application
    platform: macOS
    sources:
      - path: RemindSort
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: RemindSort
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: public.app-category.productivity
        NSRemindersFullAccessUsageDescription: "RemindSort reads your reminders so it can show and prioritize them."
        LSMinimumSystemVersion: "26.0"
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattbryson.RemindSort
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
