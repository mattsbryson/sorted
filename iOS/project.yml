name: RemindSort
options:
  bundleIdPrefix: com.mattbryson
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
targets:
  RemindSort:
    type: application
    platform: iOS
    sources:
      - path: RemindSort
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: RemindSort
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: public.app-category.productivity
        NSRemindersFullAccessUsageDescription: "RemindSort reads your reminders so it can show and prioritize them."
        # A visible launch screen shown by iOS the instant the app is
        # tapped, before any code runs. An empty UILaunchScreen dict renders
        # solid systemBackground — pure black in dark mode — which reads as
        # a hung app during the several seconds a cold start takes on
        # device. The centered star makes it obviously alive.
        UILaunchScreen:
          UIImageName: LaunchIcon
        UIRequiredDeviceCapabilities: [arm64]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattbryson.RemindSort.iOS
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        TARGETED_DEVICE_FAMILY: "1,2"
