name: Sorted
options:
  bundleIdPrefix: com.mattbryson
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  # MLX Swift examples: the on-device LLM stack for the "MLX big-batch" ranker
  # (Option 2). MLXLLM registers the concrete LLM model implementations;
  # MLXLMCommon provides the loader (loadModelContainer) and ChatSession used
  # by MLXRanker. This pulls in mlx-swift and swift-transformers transitively.
  # Weights are downloaded from Hugging Face at runtime, not at build time.
  # MLX requires an Apple-Silicon Mac.
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.1"
  # Transitive-dependency version lock, mirroring mlx-swift-examples 2.29.1's
  # own tested Package.resolved. Its dependency ranges (`swift-transformers
  # .upToNextMinor(from: "1.0.0")`, `swift-jinja from: 2.0.0`) otherwise let
  # SwiftPM float swift-jinja up to 2.4.0, whose `Value.object` API
  # (`[ObjectKey: Value]`) no longer matches swift-transformers 1.0.0's call
  # (`[String: Value]`) — a build break in the floated combination. Pinning both
  # to the exact revisions mlx-swift-examples 2.29.1 shipped and tested against
  # (swift-transformers 1.0.0, swift-jinja 2.1.0) restores a compiling graph.
  # Root revision pins override transitive version ranges in SwiftPM. Revisit
  # when bumping mlx-swift-examples.
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    revision: a2e184dddb4757bc943e77fbe99ac6786c53f0b2
  swift-jinja:
    url: https://github.com/huggingface/swift-jinja.git
    revision: c1ef5963ba4a97a589b9c9583ff4ee3352a86d23
targets:
  Sorted:
    type: application
    platform: macOS
    sources:
      - path: Sorted
      # Platform-agnostic code shared verbatim with the iOS project — one
      # copy on disk, referenced by both project.ymls.
      - path: ../Shared
        excludes:
          - Resources/**
      # Core ML LTR model, bundled as a compiled resource (Xcode compiles the
      # .mlpackage to .mlmodelc at build). Trained by Tooling/CoreMLLTR.
      - path: ../Shared/Resources/ImportanceRanker.mlpackage
        buildPhase: resources
    dependencies:
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Sorted
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: public.app-category.productivity
        NSRemindersFullAccessUsageDescription: "Sorted reads your reminders so it can show and prioritize them."
        LSMinimumSystemVersion: "26.0"
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattbryson.Sorted
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        # Signing team, kept here (not just in the generated .pbxproj) so it
        # survives `xcodegen generate`. Change this to your own team ID.
        DEVELOPMENT_TEAM: A9K8GZ46Y9
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
  # Standalone logic tests: compiles the scorer's sources straight into the
  # test bundle (no app host), so running tests never launches the app or
  # triggers its Reminders permission prompt.
  SortedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: ../Shared/Models/ReminderItem.swift
      - path: ../Shared/Models/ImportanceTiers.swift
      - path: ../Shared/Services/UrgencyScorer.swift
      # A/B tooling metrics under test.
      - path: ../Shared/Services/RankingMetrics.swift
      - path: ../Shared/Services/PreferenceReconstruction.swift
      # Core ML LTR ranker under test, plus the protocol/availability types it
      # depends on. AIPrioritizer is pulled in only because the Ranker protocol
      # extends it; the tests exercise CoreMLRanker's pure feature/scoring code.
      - path: ../Shared/Services/CoreMLRanker.swift
      - path: ../Shared/Services/Ranker.swift
      - path: ../Shared/Services/AIPrioritizer.swift
      - path: ../Shared/Services/ImportanceCache.swift
      - path: ../Shared/Services/TopOrderCache.swift
      - path: ../Shared/Models/RankedOrder.swift
      # Classification few-shot content and the Face Off log it reads
      # (AIPrioritizer's and MLXRanker's prompts now include both).
      - path: ../Shared/Services/TitleEmbedding.swift
      - path: ../Shared/Services/ClassificationExamples.swift
      - path: ../Shared/Services/FaceOffLog.swift
      - path: ../Shared/Services/TrainingLog.swift
      # MLXRanker's prompt/parse logic is pure (Foundation only); the MLX
      # inference paths are behind `#if canImport(MLXLLM)` so this compiles into
      # the test bundle without linking MLX. Lets us unit-test prompt
      # construction and output parsing even where the model can't run.
      - path: ../Shared/Services/MLXRanker.swift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        # Compiles MLXRanker's pure helpers into the logic-test bundle without
        # its FoundationModels-backed Ranker/AIAvailability glue or MLX, which
        # aren't part of this hostless bundle. See MLXRanker's SORTED_TESTS note.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: SORTED_TESTS
schemes:
  # Listed first so it's the default scheme Xcode selects after `xcodegen
  # generate` — otherwise the non-runnable SortedTests bundle becomes the
  # default and the app "builds but won't launch". Runs the app; ⌘U still tests.
  Sorted:
    build:
      targets:
        Sorted: all
    run:
      config: Debug
    test:
      targets:
        - SortedTests
  SortedTests:
    build:
      targets:
        SortedTests: all
    test:
      targets:
        - SortedTests
