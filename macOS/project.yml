name: Sorted
options:
  bundleIdPrefix: com.mattbryson
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
targets:
  Sorted:
    type: application
    platform: macOS
    sources:
      - path: Sorted
      # Platform-agnostic code shared verbatim with the iOS project — one
      # copy on disk, referenced by both project.ymls.
      - path: ../Shared
        excludes:
          - Resources/**
      # Core ML LTR model, bundled as a compiled resource (Xcode compiles the
      # .mlpackage to .mlmodelc at build). Trained by Tooling/CoreMLLTR.
      - path: ../Shared/Resources/ImportanceRanker.mlpackage
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Sorted
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: public.app-category.productivity
        NSRemindersFullAccessUsageDescription: "Sorted reads your reminders so it can show and prioritize them."
        LSMinimumSystemVersion: "26.0"
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattbryson.Sorted
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        # Signing team, kept here (not just in the generated .pbxproj) so it
        # survives `xcodegen generate`. Change this to your own team ID.
        DEVELOPMENT_TEAM: A9K8GZ46Y9
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
  # Standalone logic tests: compiles the scorer's sources straight into the
  # test bundle (no app host), so running tests never launches the app or
  # triggers its Reminders permission prompt.
  SortedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: ../Shared/Models/ReminderItem.swift
      - path: ../Shared/Models/ImportanceTiers.swift
      - path: ../Shared/Services/UrgencyScorer.swift
      # A/B tooling metrics under test.
      - path: ../Shared/Services/RankingMetrics.swift
      - path: ../Shared/Services/PreferenceReconstruction.swift
      # Core ML LTR ranker under test, plus the protocol/availability types it
      # depends on. AIPrioritizer is pulled in only because the Ranker protocol
      # extends it; the tests exercise CoreMLRanker's pure feature/scoring code.
      - path: ../Shared/Services/CoreMLRanker.swift
      - path: ../Shared/Services/Ranker.swift
      - path: ../Shared/Services/AIPrioritizer.swift
      - path: ../Shared/Services/ImportanceCache.swift
      - path: ../Shared/Services/TopOrderCache.swift
      - path: ../Shared/Models/RankedOrder.swift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  SortedTests:
    build:
      targets:
        SortedTests: all
    test:
      targets:
        - SortedTests
