name: RemindSort
options:
  bundleIdPrefix: com.mattbryson
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
targets:
  RemindSort:
    type: application
    platform: macOS
    sources:
      - path: RemindSort
      # Platform-agnostic code shared verbatim with the iOS project — one
      # copy on disk, referenced by both project.ymls.
      - path: ../Shared
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: RemindSort
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: public.app-category.productivity
        NSRemindersFullAccessUsageDescription: "RemindSort reads your reminders so it can show and prioritize them."
        LSMinimumSystemVersion: "26.0"
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattbryson.RemindSort
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
  # Standalone logic tests: compiles the scorer's sources straight into the
  # test bundle (no app host), so running tests never launches the app or
  # triggers its Reminders permission prompt.
  RemindSortTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: ../Shared/Models/ReminderItem.swift
      - path: ../Shared/Models/ImportanceTiers.swift
      - path: ../Shared/Services/UrgencyScorer.swift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  RemindSortTests:
    build:
      targets:
        RemindSortTests: all
    test:
      targets:
        - RemindSortTests
